<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 3D Engine v2</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #1a1a1a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Sidebar Styling */
        #sidebar { width: 250px; background: #252525; border-right: 1px solid #444; display: flex; flex-direction: column; padding: 10px; }
        #hierarchy { flex-grow: 1; overflow-y: auto; margin-top: 10px; border: 1px solid #333; background: #111; padding: 5px; }
        .scene-item { padding: 8px; margin-bottom: 5px; background: #333; cursor: pointer; border-radius: 4px; font-size: 14px; }
        .scene-item:hover { background: #444; }
        .scene-item.active { border-left: 4px solid #0078d4; background: #3a3a3a; }

        /* Toolbar */
        .btn { background: #0078d4; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 10px; }
        .btn:hover { background: #005a9e; }

        /* Viewport */
        #viewport { flex-grow: 1; position: relative; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Scene Hierarchy</h3>
        <button class="btn" id="addCube">Add Cube +</button>
        <div id="hierarchy">
            </div>
        <p style="font-size: 11px; color: #888;">Select an item to edit in the right panel</p>
    </div>

    <div id="viewport"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "dat.gui": "https://unpkg.com/dat.gui@0.7.9/build/dat.gui.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GUI } from 'dat.gui';

        // ENGINE STATE
        const objects = [];
        let selectedObject = null;
        let cubeCount = 0;

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 250) / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 250, window.innerHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 3);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));
        camera.position.set(3, 3, 5);
        camera.lookAt(0, 0, 0);

        // 2. GUI SETUP
        const gui = new GUI({ autoPlace: false });
        document.getElementById('sidebar').appendChild(gui.domElement);
        const transformFolder = gui.addFolder('Object Inspector');
        transformFolder.open();

        // 3. ENGINE FUNCTIONS
        function createCube() {
            cubeCount++;
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
            const cube = new THREE.Mesh(geometry, material);
            
            cube.name = `Cube_${cubeCount}`;
            cube.position.set(Math.random() * 2 - 1, Math.random() * 2 - 1, 0);
            
            scene.add(cube);
            objects.push(cube);
            updateHierarchyUI();
            selectObject(cube);
        }

        function updateHierarchyUI() {
            const container = document.getElementById('hierarchy');
            container.innerHTML = '';
            objects.forEach(obj => {
                const div = document.createElement('div');
                div.className = `scene-item ${selectedObject === obj ? 'active' : ''}`;
                div.innerText = obj.name;
                div.onclick = () => selectObject(obj);
                container.appendChild(div);
            });
        }

        function selectObject(obj) {
            selectedObject = obj;
            updateHierarchyUI();

            // Refresh GUI for the new selected object
            transformFolder.__controllers.forEach(c => transformFolder.remove(c));
            
            // Allow changing the name!
            const nameControl = { name: obj.name };
            transformFolder.add(nameControl, 'name').name('Object Name').onChange(v => {
                obj.name = v;
                updateHierarchyUI();
            });

            transformFolder.add(obj.position, 'x', -5, 5).name('Pos X');
            transformFolder.add(obj.position, 'y', -5, 5).name('Pos Y');
            transformFolder.add(obj.rotation, 'y', 0, Math.PI * 2).name('Rotation');
            transformFolder.addColor({ color: obj.material.color.getHex() }, 'color').onChange(v => {
                obj.material.color.set(v);
            });
        }

        // 4. EVENT LISTENERS
        document.getElementById('addCube').addEventListener('click', createCube);

        window.addEventListener('resize', () => {
            const width = window.innerWidth - 250;
            camera.aspect = width / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(width, window.innerHeight);
        });

        // 5. START ENGINE
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        
        createCube(); // Start with one cube
        animate();
    </script>
</body>
</html>
