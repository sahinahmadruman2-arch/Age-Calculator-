<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple 3D Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #ui-label { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-label">
        <h2>3D No-Code Editor</h2>
        <p>Use the panel on the right to "code" the cube.</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "dat.gui": "https://unpkg.com/dat.gui@0.7.9/build/dat.gui.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GUI } from 'dat.gui';

        // 1. SETUP THE SCENE
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. ADD AN OBJECT (The Cube)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // 3. ADD LIGHTING
        const light = new THREE.PointLight(0xffffff, 50);
        light.position.set(2, 2, 2);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 5;

        // 4. THE "NO-CODE" INTERFACE (The GUI)
        const gui = new GUI();
        const cubeFolder = gui.addFolder('Cube Settings');
        
        // Connect UI sliders to Cube properties
        cubeFolder.add(cube.position, 'x', -3, 3).name('Move Left/Right');
        cubeFolder.add(cube.position, 'y', -3, 3).name('Move Up/Down');
        cubeFolder.add(cube.scale, 'x', 0.1, 5).name('Width');
        cubeFolder.add(cube.rotation, 'y', 0, Math.PI * 2).name('Spin');
        
        // Add a color picker
        const conf = { color: '#00ff00' };
        cubeFolder.addColor(conf, 'color').onChange((value) => {
            cube.material.color.set(value);
        });

        cubeFolder.open();

        // 5. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
